<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Documentos</title>

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#0d6efd">

</head>

<body>

<div class="contenedor">

<h1>Registro de Documentos</h1>


<label>Usuario</label>
<input 
type="text" 
id="usuario" 
readonly>


<label>Conductor</label>
<input 
type="text" 
id="conductor"
placeholder="Ingrese conductor">


<label>Documento (solo números)</label>
<input 
type="text"
id="documento"
inputmode="numeric"
placeholder="Ingrese número">


<label>Sucursal</label>
<input 
type="text"
id="sucursal"
placeholder="Ingrese sucursal">


<label>Tipo de documento</label>

<select id="tipo">

<option value="">
-- Seleccionar --
</option>

<option>
Factura
</option>

<option>
Solicitud de Traslado
</option>

<option>
Débito
</option>

</select>


<button id="guardar">
Guardar
</button>


<p id="mensaje"></p>


</div>


<script src="script.js"></script>

</body>
</html>
