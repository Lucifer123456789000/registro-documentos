<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Documentos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Registros">
</head>
<body>

<div class="contenedor">
    <h1>Registro de Documentos</h1>

    <label>Conductor</label>
    <input type="text" id="conductor" placeholder="Ingrese el nombre">

    <label>Documento</label>
    <input type="text" id="documento" placeholder="Ingrese el documento">

    <label>Tipo de documento</label>
    <select id="tipo">
        <option>Factura</option>
        <option>ST</option>
        <option>Débito</option>
        <option>Crédito</option>
    </select>

    <button id="guardar">Guardar</button>

</div>

<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
</html>
